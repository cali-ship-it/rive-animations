<!DOCTYPE html>
<html lang="en">
  <head>
<style>
  body{
    background-color: #FFc900;
  }
    canvas{
    width: 100%;
    height: auto;
  }
</style>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Line Section Animation</title>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <script src="https://unpkg.com/@rive-app/canvas"></script>
    <script>
      const r = new rive.Rive({
        src: "https://raw.githubusercontent.com/smalltoken1/lottie_f/refs/heads/main/Line_Section.riv",
        canvas: document.getElementById("canvas"),
        autoplay: true,
        artboard: "Line_Section",
        stateMachines: "State Machine 1",
        onLoad: () => {
          r.resizeDrawingSurfaceToCanvas();
        },
      });
    </script>
  </body>
</html>
